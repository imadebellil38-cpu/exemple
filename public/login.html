<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectHunter — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #111; --card: #141414;
      --border: #1e1e1e; --border2: #2a2a2a;
      --cyan: #00c8f8; --cyan-glow: rgba(0,200,248,.1);
      --emerald: #00e5a0;
      --text: #ededed; --text2: #a1a1a1; --muted: #666; --dim: #888;
      --red-tx: #ff6b6b; --red-bg: rgba(255,65,65,.06); --red-bd: rgba(255,65,65,.18);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px;
      position: relative;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 40px; height: 40px; margin: 0 auto .75rem;
      background: var(--text); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.3px; }
    .logo h1 span { color: var(--text2); }
    .logo p { color: var(--muted); font-size: .82rem; margin-top: .3rem; }

    .tabs { display: flex; margin-bottom: 1.5rem; gap: .4rem; }
    .tab {
      flex: 1; padding: .6rem; background: transparent; border: 1px solid var(--border2);
      border-radius: 8px; color: var(--muted); font-weight: 600; font-size: .82rem;
      cursor: pointer; transition: all .15s; text-align: center; font-family: inherit;
    }
    .tab:hover { color: var(--text2); border-color: #444; }
    .tab.on { background: var(--surface); border-color: #444; color: var(--text); }

    .form { display: none; }
    .form.on { display: block; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block; font-size: .7rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem;
    }
    .inp {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: .75rem 1rem; color: var(--text); font-size: .88rem;
      outline: none; font-family: inherit; transition: border-color .15s;
    }
    .inp:focus { border-color: #555; }
    .inp::placeholder { color: #444; }

    .btn {
      width: 100%; padding: .8rem; margin-top: .75rem;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .error {
      background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 8px;
      padding: .7rem 1rem; color: var(--red-tx); font-size: .82rem;
      margin-bottom: 1rem; display: none;
    }
    .error.on { display: block; }

    .success {
      background: rgba(0,229,160,.06); border: 1px solid rgba(0,229,160,.18); border-radius: 8px;
      padding: .7rem 1rem; color: var(--emerald); font-size: .82rem;
      margin-bottom: 1rem; display: none;
    }
    .success.on { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <h1>Prospect<span>Hunter</span></h1>
      <p>Connecte-toi pour commencer</p>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="showTab('login')">J'ai déjà un compte 😎</button>
      <button class="tab" onclick="showTab('register')">Je veux ma place 🔥</button>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <!-- Login form -->
    <div id="form-login" class="form on">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="login-email" placeholder="tonmail@business.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="login-pass" placeholder="Ton mot de passe secret 🤫" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">Let's go, je rentre ! 🚀</button>
    </div>

    <!-- Register form -->
    <div id="form-register" class="form">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="reg-email" placeholder="boss@empire.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="reg-pass" placeholder="Un truc solide (6 car. mini)" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirmer (t'as intérêt à te souvenir)</label>
        <input class="inp" type="password" id="reg-pass2" placeholder="Le même, en mieux 😤" autocomplete="new-password">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">Créer mon empire 👑</button>
    </div>
  </div>

<script>
// If already logged in, redirect
if (localStorage.getItem('ph_token')) {
  window.location.href = '/app';
}

// URL params
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
const tabParam = urlParams.get('tab');
if (tabParam === 'register') {
  setTimeout(() => showTab('register'), 50);
}
if (refCode) {
  setTimeout(() => {
    showTab('register');
    showSuccess('Ton pote t\'a invité ! Inscris-toi et récupère 5 crédits gratuits, petit veinard 🎁');
  }, 100);
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === (tab === 'login' ? 0 : 1)));
  document.getElementById('form-login').classList.toggle('on', tab === 'login');
  document.getElementById('form-register').classList.toggle('on', tab === 'register');
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.classList.add('on');
  document.getElementById('success').classList.remove('on');
}
function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg; el.classList.add('on');
  document.getElementById('error').classList.remove('on');
}
function hideMessages() {
  document.getElementById('error').classList.remove('on');
  document.getElementById('success').classList.remove('on');
}

async function doLogin() {
  hideMessages();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!email || !password) return showError('T\'as oublié de remplir un champ... c\'est ta faute hein 🙄');

  document.getElementById('btn-login').disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Mauvais combo email/mdp — t\'as oublié ton propre mot de passe ? 😅');

    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    window.location.href = '/app';
  } catch (err) {
    showError('Pas de connexion. T\'as payé ta box ce mois-ci ? 📡');
  } finally {
    document.getElementById('btn-login').disabled = false;
  }
}

async function doRegister() {
  hideMessages();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const password2 = document.getElementById('reg-pass2').value;

  if (!email || !password || !password2) return showError('Y\'a des champs vides — t\'as 3 champs, c\'est pas la mer à boire 🤦');
  if (password !== password2) return showError('Les mots de passe matchent pas... relis ce que t\'écris 🙃');
  if (password.length < 6) return showError('6 caractères MINIMUM. Fais un effort 💪');

  document.getElementById('btn-register').disabled = true;
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, referral_code: refCode || undefined }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Inscription ratée — t\'as dû faire une boulette quelque part 😅');

    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    window.location.href = '/app';
  } catch (err) {
    showError('Pas de réseau. T\'es en zone blanche ou t\'as oublié le WiFi ? 📡');
  } finally {
    document.getElementById('btn-register').disabled = false;
  }
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').classList.contains('on')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
